publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.9.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.0

  google_maps_flutter: ^2.5.0
  geocoding: ^2.1.1
  location: ^5.0.0
  permission_handler: ^11.0.0

  http: ^1.2.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

